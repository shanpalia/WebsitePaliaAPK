<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaliaAPK HUB - Home</title>
    <meta name="description" content="PaliaAPK HUB - Your trusted source for APK downloads.">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/slider.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/animations.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">

    <!-- Applies the saved theme before first paint to avoid a light/dark flash.
         Full toggle logic lives in js/theme.js. -->
    <script>
        (function () {
            try {
                var savedTheme = localStorage.getItem('palia-theme');
                if (savedTheme === 'dark' || savedTheme === 'light') {
                    document.documentElement.setAttribute('data-theme', savedTheme);
                }
            } catch (error) {
                /* localStorage unavailable — default (light) theme is used. */
            }
        })();
    </script>
</head>
<body>

    <!-- Header -->
    <header id="site-header" class="site-header">

        <div class="header-top">
            <div class="header-container">

                <!-- Logo -->
                <a href="index.html" class="header-logo" aria-label="PaliaAPK HUB home">
                    <span class="logo-mark" aria-hidden="true">P</span>
                    <span class="logo-text">PaliaAPK HUB</span>
                </a>

                <!-- Search -->
                <div class="header-search">
                    <form class="search-form" role="search" aria-label="Site search" onsubmit="return false;">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" class="search-input" id="desktop-search-input" placeholder="Search Apps, Games, AI Tools..." autocomplete="off">
                        <button type="button" class="search-clear" aria-label="Clear search">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </form>
                </div>

                <!-- Actions: notifications, theme toggle, user menu, mobile toggle -->
                <div class="header-actions">

                    <button type="button" class="icon-btn notification-btn" id="notification-btn" aria-label="View notifications">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="notification-badge" id="notification-badge">3</span>
                    </button>

                    <button type="button" class="theme-toggle icon-btn" id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">
                        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="4"></circle>
                            <line x1="12" y1="2" x2="12" y2="4.5"></line>
                            <line x1="12" y1="19.5" x2="12" y2="22"></line>
                            <line x1="4.2" y1="4.2" x2="5.9" y2="5.9"></line>
                            <line x1="18.1" y1="18.1" x2="19.8" y2="19.8"></line>
                            <line x1="2" y1="12" x2="4.5" y2="12"></line>
                            <line x1="19.5" y1="12" x2="22" y2="12"></line>
                            <line x1="4.2" y1="19.8" x2="5.9" y2="18.1"></line>
                            <line x1="18.1" y1="5.9" x2="19.8" y2="4.2"></line>
                        </svg>
                        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M21 12.5A9 9 0 1 1 11.5 3a7 7 0 0 0 9.5 9.5z"></path>
                        </svg>
                    </button>

                    <div class="user-menu">
                        <button type="button" class="user-avatar-btn" id="user-menu-btn" aria-haspopup="true" aria-expanded="false" aria-controls="user-dropdown">
                            <span class="avatar-initials">U</span>
                        </button>
                        <ul class="user-dropdown" id="user-dropdown" role="menu" aria-label="User menu">
                            <li role="none"><a href="#" role="menuitem">Profile</a></li>
                            <li role="none"><a href="#" role="menuitem">Downloads</a></li>
                            <li role="none"><a href="#" role="menuitem">Bookmarks</a></li>
                            <li role="none"><a href="#" role="menuitem">Settings</a></li>
                            <li class="dropdown-divider" role="separator"></li>
                            <li role="none"><a href="#" role="menuitem" id="logout-link">Logout</a></li>
                        </ul>
                    </div>

                    <button type="button" class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobile-panel">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                    </button>

                </div>
            </div>

            <!-- Mobile slide-down panel: search + account links (small screens only) -->
            <div class="mobile-panel" id="mobile-panel">
                <form class="search-form" role="search" aria-label="Site search (mobile)" onsubmit="return false;">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="7"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" class="search-input" id="mobile-search-input" placeholder="Search Apps, Games, AI Tools..." autocomplete="off">
                    <button type="button" class="search-clear" aria-label="Clear search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </form>
                <ul class="mobile-account-list">
                    <li><a href="#">Profile</a></li>
                    <li><a href="#">Downloads</a></li>
                    <li><a href="#">Bookmarks</a></li>
                    <li><a href="#">Settings</a></li>
                    <li><a href="#" id="mobile-logout-link">Logout</a></li>
                </ul>
            </div>
        </div>

        <!-- Category Navigation -->
        <nav class="category-nav" aria-label="App categories">
            <ul class="category-list" id="category-list">
                <li><a href="#" class="category-pill active" data-category="home">Home</a></li>
                <li><a href="#" class="category-pill" data-category="ai">AI</a></li>
                <li><a href="#" class="category-pill" data-category="apps">Apps</a></li>
                <li><a href="#" class="category-pill" data-category="games">Games</a></li>
                <li><a href="#" class="category-pill" data-category="social">Social</a></li>
                <li><a href="#" class="category-pill" data-category="tools">Tools</a></li>
                <li><a href="#" class="category-pill" data-category="photography">Photography</a></li>
                <li><a href="#" class="category-pill" data-category="video">Video</a></li>
                <li><a href="#" class="category-pill" data-category="music">Music</a></li>
                <li><a href="#" class="category-pill" data-category="education">Education</a></li>
                <li><a href="#" class="category-pill" data-category="utilities">Utilities</a></li>
                <li><a href="#" class="category-pill" data-category="finance">Finance</a></li>
            </ul>
        </nav>

    </header>

    <!-- Main Content -->
    <main id="main-content">
        <!-- TODO: Hero slider -->
        <section id="hero-slider"></section>

        <!-- TODO: Featured apps / categories -->
        <section id="featured-apps"></section>
    </main>

    <!-- Footer -->
    <footer id="site-footer">
        <!-- TODO: Footer links, social icons, copyright -->
    </footer>

    <!-- Scripts -->
    <script src="js/theme.js" defer></script>
    <script src="js/slider.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/app.js" defer></script>
</body>
</html>
